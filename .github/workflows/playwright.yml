name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # Gate: build the app from the fork's source, run it locally in Docker, and run
  # a fast Chromium-only pass against it. Only if this passes do we hit the hosted app.
  local-e2e:
    name: E2E (local Docker app — Chromium gate)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      BASE_URL: 'http://localhost:4200'
      API_URL: 'http://localhost:8091'
      RESET_DB: 'true'
      CUSTOMER_EMAIL: ${{ secrets.CUSTOMER_EMAIL }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Checkout app under test (fork)
        uses: actions/checkout@v4
        with:
          repository: lmacfie2345/practice-software-testing
          ref: main
          path: app

      - name: Start app (build from source, minimal stack)
        working-directory: app
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for app to be healthy
        shell: bash
        run: |
          wait_for() {
            local url="$1" name="$2" tries=120
            echo "Waiting for $name at $url ..."
            for i in $(seq 1 $tries); do
              code=$(curl -s -o /dev/null -w '%{http_code}' "$url" || echo 000)
              if [ "$code" = "200" ]; then
                echo "$name is up (HTTP 200) after $((i*5))s."
                return 0
              fi
              sleep 5
            done
            echo "::error::$name did not become healthy at $url within $((tries*5))s (last HTTP $code)."
            return 1
          }
          wait_for "http://localhost:8091/status" "API"
          wait_for "http://localhost:4200" "UI"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw
        shell: bash
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests (Chromium against local app)
        run: npm run test:chromium

      - name: Dump app logs on failure
        if: failure()
        working-directory: app
        run: docker compose -f docker-compose.yml logs --no-color

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-local
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (screenshots/videos/traces)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-local
          path: test-results/
          retention-days: 14

  # Final check against the shared hosted environment — only runs if the local gate passed.
  hosted-e2e:
    name: E2E (hosted app — all browsers)
    needs: local-e2e
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      BASE_URL: ${{ vars.BASE_URL || 'https://practicesoftwaretesting.com' }}
      API_URL: ${{ vars.API_URL || 'https://api.practicesoftwaretesting.com' }}
      CUSTOMER_EMAIL: ${{ secrets.CUSTOMER_EMAIL }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw
        shell: bash
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Lint
        run: npm run lint

      - name: Run Playwright tests
        run: npm test

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-hosted
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (screenshots/videos/traces)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-hosted
          path: test-results/
          retention-days: 14
